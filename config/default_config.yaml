# FlyGym v2 tracker — default configuration. Copy and override per experiment.

source:
  type: camera            # camera | video
  video_path: null        # used when type == video
  # camera settings (HikRobot MvImport). null = the tracker sends NOTHING for that node, so the
  # camera keeps whatever MVS left it at. This is the base layer every config merges onto, so a
  # number here would be imposed on every rig that did not explicitly override it back to null.
  camera:
    # null = use the camera at `index` (0), which is right for a single-camera bench. Pin a serial
    # only where there is more than one camera, and pin it in the machine's own `.local.yaml`
    # rather than here -- a serial in a shipped template is one machine's hardware imposed on
    # every other machine. See the note in flygym_rig.yaml.
    serial: null
    index: 0              # which enumerated camera to use when no serial is pinned
    width: null           # sensor ROI width; start-only (needs the stream stopped)
    height: null          # sensor ROI height; start-only
    exposure_us: null     # microseconds; pin (e.g. 20000) for a hard frame-rate cap
    gain_db: null         # dB
    frame_rate: null      # fps
    pixel_format: "Mono8"

calibration:
  path: "calib"           # dir holding calibration.json + illum_mask_*.png

rotation:
  detector: threshold     # threshold = fixed enter/exit magnitude | adaptive = speed-independent (auto)
  roi: full               # where the rotation signal is measured. full = whole frame (validated,
                          #   right when the tubes are near-empty). marker_band = the marker strip
                          #   only -- rigid drum, no flies -- so many flies churning inside the
                          #   tubes cannot be misread as the drum turning. Needs a calibrated band;
                          #   falls back to full if the band rows are unknown. adaptive mode only.
  sensitivity: 1.0        # adaptive mode only: higher = more sensitive
  min_consistency: 0.6    # adaptive mode only: how straight motion must be to count as the drum
                          # turning rather than flies milling about (0..1)
  metric: mean_abs_diff
  enter_threshold: null   # threshold mode: null = seed from measured noise floor (cli noise)
  exit_threshold: null
  debounce_frames: 8      # consecutive quiet frames to declare stationary
  min_stationary_frames: 10   # settling frames after stationary onset (skip for activity)

activity:
  reference: prev_stationary   # diff baseline; reset after rotation / face change
  pixel_threshold: null   # null = noise_mean + k*noise_std
  k: 5.0
  normalize_by_lit_area: true

binning:
  bin_seconds: 60

markers:
  # The FlyGym v2 drum flips ~180 degrees and shows both faces, so face identification is on by
  # default. The physical markers exist (IR-opaque stickers on the rotation axis) and are decoded
  # by marker_band.MarkerBandDetector; a bundle learns one template per face via `select-vials`.
  # Set false only for a rig that genuinely presents a single face.
  enabled: true

output:
  dir: "output"
  format: both            # csv | xlsx | both
  rolling: daily          # new file per day
  snapshot_every_s: 0     # 0 = never; else periodic full-frame PNG for spot checks

logging:
  level: INFO
