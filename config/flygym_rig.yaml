# Tuned config for the FlyGym v2 rig, validated on real flies (2026-07-18).
# Key finding: measure fly motion WITHIN the static dwells (drum fully stopped, same pose) on
# UNCOMPRESSED live frames. On a 90s clip with flies in vial 7, this gave a 42:1 activity
# separation of the fly vial from all others (idealized), ~5:1 through the full pipeline (the gap
# is the two-tilt-pose rocking — see docs/validation_realfly.md).

source:
  type: camera
  camera:
    # null = NOT SENT to the camera, so it starts with whatever MVS last left it at. These five
    # were forced to 1280x1024 @ 20 fps on every run, which meant a setting changed in MVS was
    # silently reverted by the tracker. Adjust them in the software with `run.bat` [S] (or
    # `flygym-tracker settings`), which writes explicit values back here; press d on a row there
    # to return it to null. pixel_format is NOT optional: the pipeline needs Mono8 frames.
    #
    # SERIAL IS NULL IN THE SHIPPED TEMPLATE, AND THIS IS A BUG THAT ALREADY BIT. It used to read
    # "DA4282883" -- the serial of the development rig's own camera. Every other machine then
    # searched for a camera that was not attached to it and failed with "camera could not be
    # opened", which reads as a broken program rather than as a setting pointing at somebody
    # else's hardware.
    #
    # null means "use the camera at `index`", which is 0, which is the right answer on the
    # overwhelmingly common single-camera bench. Pin a serial ONLY on a machine with more than one
    # camera -- and pin it in `flygym_rig.local.yaml`, which is this machine's own layer, not here
    # in the template everybody gets. The camera picker in the window writes it there for you.
    serial: null
    width: null               # sensor ROI width  (start-only: applies when acquisition starts)
    height: null              # sensor ROI height (start-only)
    exposure_us: null         # microseconds; live-adjustable mid-run
    gain_db: null             # dB; live-adjustable mid-run
    frame_rate: null          # fps; live-adjustable mid-run
    pixel_format: "Mono8"

calibration:
  path: "calib"              # build with the MANUAL wizard (auto-detect mis-flags vial 7 as empty)

rotation:
  detector: adaptive          # rotation speed/characteristics vary between runs -> auto-detect motion,
  sensitivity: 1.0            # do not preset a magnitude. (enter/exit below are ignored in adaptive mode.)
  debounce_frames: 4          # dwells are short (~2 s) - keep settling small
  min_stationary_frames: 3
  # threshold-mode fallback values (measured: rotation ~9 mean|diff|, static dwell ~1.6):
  enter_threshold: 6.0
  exit_threshold: 3.0

activity:
  pixel_threshold: 12.0       # above the uncompressed sensor-noise floor; catches fly shadows
  k: 5.0
  normalize_by_lit_area: true

binning:
  bin_seconds: 10             # user-defined; 10 s shown here, set per experiment

markers:
  # REQUIRED: the drum flips ~180 degrees and shows BOTH faces for roughly equal time, so the
  # marker band is the only thing that says which 16 vials are on screen. With this off, every
  # face-B vial is recorded as face A (it happened - see face_learning.py).
  enabled: true

output:
  dir: "output"
  format: both
  rolling: daily

logging:
  level: INFO
